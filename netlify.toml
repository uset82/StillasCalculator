[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  STILLAS_AI_PROVIDER = "openai-account"
  # Set STILLAS_CODEX_BACKEND_URL and STILLAS_CODEX_BACKEND_SECRET in the
  # Netlify UI/CLI. Do not commit the backend secret.
